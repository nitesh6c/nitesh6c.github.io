name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A4741F: ${{ secrets.A4741F }}
          B6D2DA: ${{ secrets.B6D2DA }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A4741F', '')
          env_b = os.environ.get('B6D2DA', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- 6c346e52edaf667ecb2a1956be6cc7a637 -->', env_a)
          if env_b:
              result = result.replace('<!-- 8f27822bb4a93f6effeec7d08080945e35 -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
